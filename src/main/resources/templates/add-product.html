<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main})}">
<body>
<main>
    <h2><i class="bi bi-plus-circle"></i> Add New Product</h2>

    <form th:action="@{/products/add}" th:object="${product}" method="post">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label"><i class="bi bi-tag"></i> Product Name</label>
                <input type="text" class="form-control" th:field="*{name}" placeholder="e.g. iPhone 15 Pro" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label"><i class="bi bi-building"></i> Brand</label>
                <input type="text" class="form-control" th:field="*{brand}" placeholder="e.g. Apple">
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label"><i class="bi bi-grid"></i> Category</label>
                <select class="form-select" th:field="*{category}">
                    <option value="">-- Select --</option>
                    <option value="Phone">Phone</option>
                    <option value="Laptop">Laptop</option>
                    <option value="Tablet">Tablet</option>
                    <option value="Headphone">Headphone</option>
                    <option value="Smartwatch">Smartwatch</option>
                    <option value="Accessory">Accessory</option>
                </select>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label"><i class="bi bi-currency-dollar"></i> Price (VND)</label>
                <input type="number" class="form-control" th:field="*{price}" placeholder="e.g. 25000000" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label"><i class="bi bi-boxes"></i> Quantity</label>
                <input type="number" class="form-control" th:field="*{quantity}" placeholder="e.g. 50" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-card-text"></i> Description</label>
            <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Product description..."></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-image"></i> Image URL</label>
            <input type="text" class="form-control" th:field="*{imageUrl}" placeholder="https://example.com/image.jpg">
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-circle"></i> Save Product</button>
            <a href="/products" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
