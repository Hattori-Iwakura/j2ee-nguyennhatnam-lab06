<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::main})}">
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0"><i class="bi bi-cart3"></i> Shopping Cart</h2>
        <a th:href="@{/cart/clear}" class="btn btn-secondary btn-sm"
           th:unless="${#lists.isEmpty(cartItems)}"
           onclick="return confirm('Clear all items from cart?')">
            <i class="bi bi-x-circle"></i> Clear Cart
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(cartItems)}" class="alert alert-info">
        <i class="bi bi-info-circle"></i> Your cart is empty.
        <a th:href="@{/products}" class="alert-link">Continue shopping</a>
    </div>

    <div th:unless="${#lists.isEmpty(cartItems)}">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Product Name</th>
                        <th class="text-end-col">Price</th>
                        <th class="text-center">Quantity</th>
                        <th class="text-end-col">Total</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item, iterStat : ${cartItems}">
                        <td><span class="badge bg-secondary" th:text="${iterStat.index + 1}"></span></td>
                        <td th:text="${item.productName}"></td>
                        <td class="text-end-col" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                        <td class="text-center">
                            <form th:action="@{/cart/update/{id}(id=${item.productId})}" method="post"
                                  class="d-flex align-items-center justify-content-center gap-1">
                                <button type="submit" name="quantity" th:value="${item.quantity - 1}"
                                        class="btn btn-sm btn-outline-secondary" style="padding: 0.15rem 0.45rem;">
                                    <i class="bi bi-dash"></i>
                                </button>
                                <span class="fw-bold mx-1" style="min-width: 24px; display: inline-block; text-align: center;"
                                      th:text="${item.quantity}"></span>
                                <button type="submit" name="quantity" th:value="${item.quantity + 1}"
                                        class="btn btn-sm btn-outline-secondary" style="padding: 0.15rem 0.45rem;">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </form>
                        </td>
                        <td class="text-end-col fw-bold" th:text="${#numbers.formatDecimal(item.total, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                        <td>
                            <a th:href="@{/cart/remove/{id}(id=${item.productId})}" class="btn-icon btn-icon-delete" title="Remove"
                               onclick="return confirm('Remove this item from cart?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr style="background-color: #1e293b; color: #fff;">
                        <td colspan="4" class="text-end fw-bold fs-6">Grand Total:</td>
                        <td class="text-end-col fw-bold fs-6" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="d-flex justify-content-between mt-3">
            <a th:href="@{/products}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Continue Shopping
            </a>
            <form th:action="@{/cart/checkout}" method="post">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-bag-check"></i> Checkout
                </button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
