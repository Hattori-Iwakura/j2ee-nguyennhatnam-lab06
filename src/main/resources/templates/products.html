<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::main})}">
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-box-seam"></i> Product List</h2>
        <a th:href="@{/products/add}" class="btn btn-success" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-circle"></i> Add Product
        </a>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="alert alert-info">
        <i class="bi bi-info-circle"></i> No products found.
    </div>

    <div class="table-responsive" th:unless="${#lists.isEmpty(products)}">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th sec:authorize="hasRole('ADMIN')">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td><span class="badge bg-secondary" th:text="${product.id}"></span></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.brand}"></td>
                    <td><span class="badge badge-category" th:text="${product.category}"></span></td>
                    <td th:text="${product.price} + ' VND'"></td>
                    <td th:text="${product.quantity}"></td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil-square"></i> Edit
                        </a>
                        <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this product?')">
                            <i class="bi bi-trash"></i> Delete
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
