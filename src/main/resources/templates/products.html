<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::main})}">
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0"><i class="bi bi-box-seam"></i> Product List</h2>
        <a th:href="@{/products/add}" class="btn btn-success" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-circle"></i> Add Product
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search, Filter, Sort -->
    <form th:action="@{/products}" method="get" class="row g-2 mb-4">
        <div class="col-md-4">
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                <input type="text" name="keyword" class="form-control" placeholder="Search by name..."
                       th:value="${keyword}"/>
            </div>
        </div>
        <div class="col-md-3">
            <select name="category" class="form-select">
                <option value="">All Categories</option>
                <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"
                        th:selected="${cat == category}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <select name="sort" class="form-select">
                <option value="">Default Sort</option>
                <option value="price_asc" th:selected="${sort == 'price_asc'}">Price: Low to High</option>
                <option value="price_desc" th:selected="${sort == 'price_desc'}">Price: High to Low</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-funnel"></i> Apply
            </button>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(products)}" class="alert alert-info">
        <i class="bi bi-info-circle"></i> No products found.
    </div>

    <div class="table-responsive" th:unless="${#lists.isEmpty(products)}">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Category</th>
                    <th class="text-end-col">Price</th>
                    <th class="text-end-col">Qty</th>
                    <th>Cart</th>
                    <th sec:authorize="hasRole('ADMIN')">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td><span class="badge bg-secondary" th:text="${product.id}"></span></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.brand}"></td>
                    <td><span class="badge badge-category" th:text="${product.category}"></span></td>
                    <td class="text-end-col" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                    <td class="text-end-col" th:text="${product.quantity}"></td>
                    <td>
                        <form th:action="@{/cart/add}" method="post" class="d-flex align-items-center gap-1">
                            <input type="hidden" name="productId" th:value="${product.id}"/>
                            <input type="number" name="quantity" value="1" min="1" class="form-control form-control-sm" style="width: 55px;"/>
                            <button type="submit" class="btn btn-success btn-sm" title="Add to cart">
                                <i class="bi bi-cart-plus"></i>
                            </button>
                        </form>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <div class="d-flex gap-1">
                            <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn-icon btn-icon-edit" title="Edit">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                            <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn-icon btn-icon-delete" title="Delete"
                               onclick="return confirm('Are you sure you want to delete this product?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, category=${category}, sort=${sort})}">
                    <i class="bi bi-chevron-left"></i> Previous
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/products(page=${i}, keyword=${keyword}, category=${category}, sort=${sort})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, category=${category}, sort=${sort})}">
                    Next <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
